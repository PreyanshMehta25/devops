services:
  mongo:
    image: mongo:7
    container_name: stackit-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: stackit-backend
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/StackIt
    ports:
      - "5001:5001"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:5001
    container_name: stackit-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mongo_data:

sonar.projectKey=stackit
sonar.projectName=StackIt
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src
sonar.tests=backend/__tests__,frontend/__tests__
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.test.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
